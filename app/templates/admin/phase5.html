{% raw %}        <!DOCTYPE html>
        <html lang="zh-CN">
        <head>
          <meta charset="utf-8" />
          <meta name="viewport" content="width=device-width, initial-scale=1" />
          <title>Phase 5 工作台</title>
          <style>
            :root {
              --bg: var(--bg-body);
              --panel: var(--bg-card);
              --line: var(--border);
              --muted: var(--text-secondary);
              --accent: var(--primary);
              --accent-dark: var(--primary-hover);
              --warn: var(--warning);
              --ok: var(--success);
              --shadow: var(--shadow-card);
            }
            .layout {
              display: grid;
              grid-template-columns: 360px minmax(0, 1fr);
              gap: 18px;
              align-items: start;
            }
            .stack {
              display: grid;
              gap: 16px;
            }
            .panel {
              background: var(--panel);
              border: 1px solid var(--line);
              border-radius: 22px;
              padding: 20px;
              box-shadow: var(--shadow);
              backdrop-filter: blur(8px);
            }
            .panel h2 {
              margin: 0 0 14px;
              font-size: 18px;
            }
            .panel-intro {
              margin: 0 0 14px;
              color: var(--muted);
              font-size: 13px;
              line-height: 1.7;
            }
            .grid {
              display: grid;
              grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
              gap: 12px;
            }
            .grid.single {
              grid-template-columns: 1fr;
            }
            .field {
              display: grid;
              gap: 6px;
            }
            .field-hint {
              margin: 0;
              color: var(--muted);
              font-size: 13px;
              line-height: 1.7;
            }
            label {
              display: block;
              margin-bottom: 6px;
              color: var(--muted);
              font-size: 13px;
            }
            input, textarea, button {
              width: 100%;
              font: inherit;
              border-radius: 14px;
            }
            input, textarea {
              padding: 12px 14px;
              background: #fffdf9;
              color: var(--text);
              border: 1px solid var(--line);
            }
            input:focus-visible,
            textarea:focus-visible,
            button:focus-visible,
            select:focus-visible,
            a:focus-visible,
            summary:focus-visible {
              outline: 2px solid rgba(29, 106, 95, 0.18);
              outline-offset: 3px;
            }
            textarea {
              min-height: 120px;
              resize: vertical;
            }
            button {
              border: none;
              padding: 12px 16px;
              cursor: pointer;
              background: var(--accent);
              color: #f8fbf7;
              transition: transform 0.12s ease, background 0.12s ease;
            }
            button:hover {
              background: var(--accent-dark);
              transform: translateY(-1px);
            }
            button.secondary {
              background: #d8c8aa;
              color: #2a2219;
            }
            button.warn {
              background: var(--warn);
              color: #fff8e8;
            }
            button.danger {
              background: var(--danger);
            }
            button[aria-busy="true"] {
              opacity: 0.82;
              cursor: progress;
            }
            .actions {
              display: grid;
              grid-template-columns: repeat(2, minmax(0, 1fr));
              gap: 10px;
              margin-top: 14px;
            }
            .action-blocks {
              display: grid;
              gap: 10px;
              margin-top: 14px;
            }
            .action-block {
              border: 1px solid var(--line);
              border-radius: 18px;
              padding: 12px;
              background: rgba(255, 253, 249, 0.84);
            }
            .action-block h3 {
              margin: 0 0 10px;
              font-size: 13px;
              color: var(--muted);
            }
            .action-grid {
              display: grid;
              grid-template-columns: repeat(2, minmax(0, 1fr));
              gap: 10px;
            }
            .action-grid button {
              width: 100%;
            }
            .status {
              display: inline-flex;
              padding: 7px 12px;
              border-radius: 999px;
              background: rgba(29, 106, 95, 0.12);
              color: var(--accent-dark);
              font-size: 12px;
              margin-bottom: 12px;
            }
            .status.warn {
              background: rgba(186, 125, 28, 0.16);
              color: #8a5c10;
            }
            .hint, .meta {
              color: var(--muted);
              font-size: 13px;
              line-height: 1.7;
            }
            .board {
              display: grid;
              align-content: start;
              grid-auto-rows: max-content;
              gap: 12px;
            }
            .filter-grid {
              display: grid;
              grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
              gap: 10px;
              margin-bottom: 12px;
            }
            .filter-grid select {
              width: 100%;
              padding: 12px 14px;
              border-radius: 14px;
              border: 1px solid var(--line);
              background: #fffdf9;
              color: var(--text);
              font: inherit;
            }
            .check-row {
              display: flex;
              align-items: center;
              gap: 10px;
              min-height: 48px;
              padding: 0 12px;
              border: 1px solid var(--line);
              border-radius: 14px;
              background: #fffdf9;
              color: var(--text);
            }
            .check-row input {
              width: auto;
              margin: 0;
            }
            .summary-strip {
              display: flex;
              flex-wrap: wrap;
              gap: 8px;
              margin-bottom: 12px;
            }
            .summary-pill {
              width: auto;
              min-width: 0;
              padding: 6px 10px;
              border-radius: 999px;
              border: 1px solid var(--line);
              background: #fffdf8;
              color: var(--muted);
              font-size: 12px;
              cursor: pointer;
              transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
            }
            .summary-pill:hover {
              background: #efe3ca;
              color: #684d22;
              border-color: #d8c8aa;
              transform: none;
            }
            .summary-pill.active {
              background: #efe3ca;
              color: #684d22;
              border-color: #d8c8aa;
            }
            .board[aria-busy="true"], .workspace[aria-busy="true"] {
              opacity: 0.82;
            }
            .group-block {
              display: grid;
              gap: 10px;
            }
            .group-title {
              display: flex;
              align-items: center;
              justify-content: space-between;
              gap: 12px;
              margin-top: 2px;
            }
            .group-title h3 {
              margin: 0;
              font-size: 15px;
            }
            .group-title span {
              font-size: 12px;
              color: var(--muted);
            }
            .task-card, .detail-card, .generation-card, .audit-card {
              background: #fffdf9;
              border: 1px solid var(--line);
              border-radius: 18px;
              padding: 14px;
              display: grid;
              align-content: start;
              gap: 8px;
              min-width: 0;
              position: relative;
              isolation: isolate;
            }
            .task-card[data-task-card] {
              cursor: pointer;
              transition: transform 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
            }
            .task-card[data-task-card]:hover {
              transform: translateY(-1px);
              border-color: rgba(29, 106, 95, 0.24);
              box-shadow: 0 14px 28px rgba(53, 36, 16, 0.08);
            }
            .task-card.selected {
              border-color: rgba(29, 106, 95, 0.3);
              box-shadow: 0 16px 30px rgba(29, 106, 95, 0.08);
            }
            .task-card h3, .detail-card h3, .generation-card h3 {
              margin: 0 0 8px;
              font-size: 16px;
              line-height: 1.45;
              overflow-wrap: anywhere;
            }
            .task-card .meta, .detail-card .meta {
              display: grid;
              gap: 4px;
              overflow-wrap: anywhere;
            }
            .task-actions {
              display: flex;
              flex-wrap: wrap;
              gap: 8px;
              margin-top: 12px;
            }
            .task-actions button {
              width: auto;
              min-width: 110px;
            }
            .workspace {
              display: grid;
              gap: 16px;
            }
            .summary-grid {
              display: grid;
              grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
              gap: 10px;
            }
            .summary-item {
              background: #fffdf8;
              border: 1px solid var(--line);
              border-radius: 16px;
              padding: 12px;
            }
            .summary-item strong {
              display: block;
              font-size: 12px;
              color: var(--muted);
              margin-bottom: 6px;
              font-weight: 500;
            }
            .summary-item span {
              display: block;
              font-size: 15px;
              line-height: 1.55;
            }
            .summary-item small {
              display: block;
              margin-top: 8px;
              color: var(--muted);
              font-size: 12px;
              line-height: 1.6;
            }
            .summary-item.signal {
              background: linear-gradient(135deg, rgba(29, 106, 95, 0.08), rgba(255, 253, 248, 0.98));
              box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.42);
            }
            .summary-item.signal strong {
              color: var(--accent-dark);
            }
            .summary-item.signal span {
              font-size: 16px;
              font-weight: 600;
            }
            .generation-list, .audit-list {
              display: grid;
              align-content: start;
              grid-auto-rows: max-content;
              gap: 12px;
            }
            .reference-list, .timeline-list {
              display: grid;
              gap: 12px;
            }
            .reference-card, .timeline-card {
              background: #fffdf9;
              border: 1px solid var(--line);
              border-radius: 16px;
              padding: 12px;
              display: grid;
              gap: 8px;
            }
            .reference-card a, .timeline-card a {
              color: var(--accent-dark);
              text-decoration: none;
              border-bottom: 1px solid rgba(18, 72, 63, 0.22);
              width: fit-content;
            }
            .generation-card.selected {
              border-color: rgba(45, 123, 79, 0.35);
              box-shadow: 0 0 0 1px rgba(45, 123, 79, 0.18);
            }
            .generation-actions {
              display: flex;
              flex-wrap: wrap;
              gap: 8px;
              margin-top: 8px;
            }
            .generation-actions button {
              width: auto;
              min-width: 124px;
            }
            .reason-list {
              margin: 0;
              padding-left: 18px;
              color: var(--text);
              display: grid;
              gap: 6px;
            }
            .reason-list li {
              line-height: 1.6;
            }
            .compare-toolbar {
              display: grid;
              grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
              gap: 10px;
              margin-bottom: 14px;
            }
            .compare-toolbar select {
              width: 100%;
              padding: 12px 14px;
              border-radius: 14px;
              border: 1px solid var(--line);
              background: #fffdf9;
              color: var(--text);
              font: inherit;
            }
            .diff-summary {
              display: flex;
              flex-wrap: wrap;
              gap: 8px;
              margin-bottom: 10px;
            }
            .diff-grid {
              display: grid;
              grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
              gap: 10px;
              margin-bottom: 10px;
            }
            .diff-card {
              background: #fffdf8;
              border: 1px solid var(--line);
              border-radius: 16px;
              padding: 12px;
            }
            .diff-card strong {
              display: block;
              margin-bottom: 6px;
              font-size: 12px;
              color: var(--muted);
              font-weight: 500;
            }
            .diff-card .before {
              color: #7c3427;
            }
            .diff-card .after {
              color: #1f6942;
            }
            .diff-pre {
              margin-top: 0;
            }
            .diff-line {
              display: block;
              padding: 1px 0;
            }
            .diff-line.add {
              color: #d8f7df;
              background: rgba(45, 123, 79, 0.28);
            }
            .diff-line.remove {
              color: #ffe3dc;
              background: rgba(157, 58, 46, 0.28);
            }
            .diff-line.same {
              color: #f7f1df;
            }
            .article-preview-shell {
              margin-top: 12px;
              padding: 16px;
              border-radius: 18px;
              border: 1px solid rgba(65, 48, 27, 0.12);
              background: linear-gradient(180deg, rgba(255, 252, 247, 0.98), rgba(247, 242, 233, 0.96));
              overflow: auto;
            }
            .article-preview-shell img {
              max-width: 100%;
              height: auto;
            }
            .article-preview-shell section {
              margin: 0 auto;
            }
            .generation-header {
              display: flex;
              flex-wrap: wrap;
              gap: 8px;
              align-items: center;
              margin-bottom: 8px;
            }
            .pill {
              display: inline-flex;
              padding: 5px 9px;
              border-radius: 999px;
              font-size: 12px;
              background: #efe3ca;
              color: #684d22;
            }
            .pill.ok {
              background: rgba(45, 123, 79, 0.12);
              color: var(--ok);
            }
            .pill.warn {
              background: rgba(186, 125, 28, 0.12);
              color: #8a5c10;
            }
            .pill.danger {
              background: rgba(157, 58, 46, 0.12);
              color: var(--danger);
            }
            details {
              margin-top: 10px;
            }
            details summary {
              cursor: pointer;
              color: var(--accent-dark);
            }
            pre {
              margin: 10px 0 0;
              padding: 14px;
              border-radius: 14px;
              background: #2c261d;
              color: #f7f1df;
              white-space: pre-wrap;
              word-break: break-word;
              overflow: auto;
              line-height: 1.65;
            }
            .audit-card {
              display: grid;
              gap: 6px;
            }
            .link-row {
              display: flex;
              flex-wrap: wrap;
              gap: 10px;
              margin-top: 6px;
            }
            .link-row a {
              color: var(--accent-dark);
              text-decoration: none;
              border-bottom: 1px solid rgba(18, 72, 63, 0.25);
            }
            .fold {
              border: 1px dashed var(--line);
              border-radius: 16px;
              padding: 12px 14px;
              background: rgba(255, 253, 249, 0.7);
            }
            .fold summary {
              cursor: pointer;
              color: var(--muted);
              font-size: 13px;
            }
            .fold .meta {
              margin-top: 10px;
            }
            __ADMIN_NAV_STYLES__
            @media (max-width: 1024px) {
              .hero-grid {
                grid-template-columns: 1fr;
              }
              .overview-strip {
                grid-template-columns: repeat(2, minmax(0, 1fr));
              }
              .layout {
                grid-template-columns: 1fr;
              }
            }
            @media (max-width: 720px) {
              main { padding: 22px 14px 36px; }
              .hero { padding: 18px; }
              .panel { padding: 16px; border-radius: 20px; }
              .hero h1 { font-size: 30px; }
              .hero-summary { grid-template-columns: 1fr; }
              .overview-strip { grid-template-columns: 1fr; }
              .overview-card.highlight { grid-column: span 1; }
              .actions { grid-template-columns: 1fr; }
              .action-grid { grid-template-columns: 1fr; }
              .task-actions { flex-direction: column; }
              .task-actions button { width: 100%; }
              .generation-actions { flex-direction: column; }
              .generation-actions button { width: 100%; }
            }
            __ADMIN_SHARED_STYLES__
          </style>
        </head>
        <body>
          <a class="skip-link" href="#review-region">跳到审核主区</a>
          <main class="admin-main">
            __ADMIN_SECTION_NAV__
            __ADMIN_HERO__
            __ADMIN_OVERVIEW__

            <section class="layout" id="review-region">
              <div class="stack">
                <section class="panel">
                  <h2>任务</h2>
                  <div class="grid single">
                    <div class="field">
                      <label for="device">device_id</label>
                      <input id="device" type="text" value="phase5-console" aria-describedby="device-hint" />
                    </div>
                    <p class="field-hint" id="device-hint">写入审计日志。</p>
                    <div class="field">
                      <label for="url">微信文章链接</label>
                      <input id="url" type="url" placeholder="https://mp.weixin.qq.com/s/..." aria-describedby="url-hint" />
                    </div>
                    <p class="field-hint" id="url-hint">已有任务可直接填 task_id。</p>
                    <div class="field">
                      <label for="task">task_id</label>
                      <input id="task" type="text" placeholder="f703c3ef-..." aria-describedby="task-hint" />
                    </div>
                    <p class="field-hint" id="task-hint">点击最近任务卡片自动填充。</p>
                    <div class="field">
                      <label for="review-note">人工审核备注</label>
                      <textarea id="review-note" placeholder="会写入 audit log，例如：结构已达标，可人工放行；或：观点重复，退回重写。" aria-describedby="review-note-hint"></textarea>
                    </div>
                    <p class="field-hint" id="review-note-hint">备注写入审计轨迹。</p>
                  </div>
                  <div class="action-blocks">
                    <div class="action-block">
                      <h3>开始</h3>
                      <div class="action-grid">
                        <button id="queue-url">链接入队</button>
                        <button id="run-url">直接执行</button>
                        <button id="load-workspace" class="secondary">加载详情</button>
                        <button id="clear" class="danger">清空</button>
                      </div>
                    </div>
                    <div class="action-block">
                      <h3>继续任务</h3>
                      <div class="action-grid">
                        <button id="queue-phase3" class="secondary">入队 Phase3</button>
                        <button id="run-phase4" class="secondary">执行 P4</button>
                        <button id="queue-phase4" class="secondary">入队 Phase4</button>
                        <button id="push-draft" class="warn">推送草稿</button>
                      </div>
                    </div>
                    <div class="action-block">
                      <h3>人工处理</h3>
                      <div class="action-grid">
                        <button id="approve-generation" class="secondary">人工通过</button>
                        <button id="reject-generation" class="danger">人工驳回重写</button>
                        <button id="allow-push" class="secondary">允许推稿</button>
                        <button id="block-push" class="danger">禁止推稿</button>
                      </div>
                    </div>
                  </div>

                </section>



                <section class="panel">
                  <h2>看板</h2>
                  <div class="filter-grid">
                    <div>
                      <label for="recent-search">搜索</label>
                      <input id="recent-search" type="search" placeholder="标题 / 链接 / task_code" autocomplete="off" />
                    </div>
                    <div>
                      <label for="recent-status-filter">状态筛选</label>
                      <select id="recent-status-filter">
                        <option value="">全部状态</option>
                        <option value="queued">queued</option>
                        <option value="review_passed">review_passed</option>
                        <option value="needs_regenerate">needs_regenerate</option>
                        <option value="needs_manual_review">needs_manual_review</option>
                        <option value="draft_saved">draft_saved</option>
                        <option value="review_failed">review_failed</option>
                        <option value="push_failed">push_failed</option>
                      </select>
                    </div>
                    <div>
                      <label for="recent-sort">排序方式</label>
                      <select id="recent-sort">
                        <option value="time">按时间（新→旧）</option>
                        <option value="status">按状态分组</option>
                      </select>
                    </div>
                    <div>
                      <label for="recent-limit">任务数量</label>
                      <input id="recent-limit" type="number" min="6" max="50" value="18" />
                    </div>
                    <div>
                      <label>队列过滤</label>
                      <div class="check-row">
                        <input id="recent-active-only" type="checkbox" checked />
                        <span>只看待处理任务</span>
                      </div>
                    </div>
                  </div>
                  <div class="actions" style="margin-top: 0;">
                    <button id="refresh-recent" class="secondary">刷新最近任务</button>
                  </div>
                  <div class="summary-strip" id="recent-summary"></div>
                  <div class="board" id="recent-list" aria-busy="false">
                    <div class="hint">等待加载最近任务...</div>
                  </div>
                </section>
              </div>

              <div class="stack">
                <section class="panel">
                  <h2>详情</h2>
                  <div class="workspace" id="workspace" aria-busy="false">
                    <div class="hint">← 选择一个任务</div>
                  </div>
                </section>

                <section class="panel">
                  <h2>接口输出</h2>
                  <pre id="output">等待输入...</pre>
                </section>
              </div>
            </section>
          </main>

          <script>
            __ADMIN_SHARED_SCRIPT_HELPERS__
            const urlEl = document.getElementById("url");
            const taskEl = document.getElementById("task");
            const reviewNoteEl = document.getElementById("review-note");
            const deviceEl = document.getElementById("device");
            const outputEl = document.getElementById("output");
            const statusEl = document.getElementById("status");
            const flashMessageEl = document.getElementById("flash-message");
            const heroFocusEl = document.getElementById("hero-focus");
            const recentListEl = document.getElementById("recent-list");
            const recentSummaryEl = document.getElementById("recent-summary");
            const recentSearchEl = document.getElementById("recent-search");
            const recentStatusEl = document.getElementById("recent-status-filter");
            const recentSortEl = document.getElementById("recent-sort");
            const recentLimitEl = document.getElementById("recent-limit");
            const recentActiveEl = document.getElementById("recent-active-only");
            const workspaceEl = document.getElementById("workspace");
            const overviewTotalEl = document.getElementById("overview-total");
            const overviewManualEl = document.getElementById("overview-manual");
            const overviewReadyEl = document.getElementById("overview-ready");
            const overviewFailedEl = document.getElementById("overview-failed");
            const overviewFocusEl = document.getElementById("overview-focus");
            const overviewFocusNoteEl = document.getElementById("overview-focus-note");
            const STATUS_LABELS = {
              queued: "待执行",
              deduping: "去重中",
              fetching_source: "抓原文",
              source_ready: "原文就绪",
              analyzing_source: "分析中",
              searching_related: "搜索中",
              fetching_related: "拉素材",
              building_brief: "建 Brief",
              brief_ready: "Brief 就绪",
              generating: "生成中",
              reviewing: "审稿中",
              review_passed: "待推草稿",
              pushing_wechat_draft: "推草稿中",
              draft_saved: "已入草稿",
              fetch_failed: "抓取失败",
              analyze_failed: "分析失败",
              search_failed: "搜索失败",
              brief_failed: "Brief 失败",
              generate_failed: "生成失败",
              review_failed: "审稿失败",
              push_failed: "推草稿失败",
              needs_manual_source: "待人工抓源",
              needs_manual_review: "待人工审核",
              needs_regenerate: "待重生成",
            };
            const STATUS_ORDER = [
              "needs_regenerate",
              "needs_manual_review",
              "review_passed",
              "push_failed",
              "review_failed",
              "generate_failed",
              "queued",
              "fetching_source",
              "analyzing_source",
              "searching_related",
              "building_brief",
              "generating",
              "reviewing",
              "pushing_wechat_draft",
              "draft_saved",
            ];

            const SESSION_EXPIRED_MESSAGE = "后台会话已失效，请刷新页面重新进入后台。";
            const {
              apiUrl,

              setButtonBusy,
              storageGet,

            const hydrateArticlePreview = (root, generations) => {

                const generationId = node.getAttribute("data-generation-html");

            const loadDraft = () => {

            const saveDraft = () => {

            const scorePillClass = (decision) => {

            const statusLabel = (status) => STATUS_LABELS[status] || status || "未知状态";
            const pushPolicyLabel = (policy) => {
              if (!policy) return "默认允许";

              if (policy.mode === "allowed") return "已人工允许";

            const reviewAiTraceScore = (review) => (review && review.ai_trace_score !== null && review.ai_trace_score !== undefined)

            const reviewAiTraceLabel = (review) => {

            const reviewAiTracePatternCount = (review) => Array.isArray(review?.ai_trace_patterns)

            const reviewHumanizeLabel = (review) => review?.humanize_applied

              : "未触发";
            const reviewVoiceSummary = (review) => truncate(review?.voice_summary || "", 120) || "暂无";
            const reviewDecisionSummary = (review, status) => {
              if (review?.final_decision === "pass") {
                return {
                  headline: "建议通过",
                  note: "审稿已给出通过结论，下一步重点判断是否允许推草稿。",

              if (review?.final_decision === "revise") {
                return {
                  headline: "建议重写",
                  note: "优先看版本差异和 AI 去痕诊断，再决定是否退回重写。",

              if (review?.final_decision === "reject") {
                return {
                  headline: "建议驳回",
                  note: "当前风险偏高，先确认是否回退历史版本或直接人工驳回。",

              }
              if (READY_STATUSES.has(status)) {
                return {
                  headline: "已通过，待判断是否推稿",

              if (WAITING_STATUSES.has(status)) {
                return {
                  headline: "待你人工判断",
                  note: "先看当前采用版本、主要风险和版本差异，再决定通过还是重写。",
                };
              }
              if (FAILED_STATUSES.has(status)) {
                return {
                  headline: "先处理异常",
                  note: "这条当前不是审稿结论问题，先看错误和时间线中的失败节点。",
                };

              return {
                headline: "先看当前版本",
                note: "系统还在推进，先读当前采用版本和最新审稿摘要。",

            const pushDecisionSummary = (status, pushPolicy, activeGeneration) => {
              if (pushPolicy?.mode === "blocked") {
                return {
                  headline: "当前禁止推稿",
                  note: pushPolicy.note || "需要先解除推稿限制，才能继续推到微信草稿箱。",

              if (activeGeneration?.draft_saved) {
                return {
                  headline: "已推入草稿箱",

              if (status === "review_passed") {
                return {
                  headline: "可决定是否推稿",
                  note: "先确认这版确实是要保留的采用版本，再决定是否推到微信草稿箱。",
                };

              return {
                headline: "暂不适合推稿",
                note: "只有已通过且未被禁止推稿的版本，才进入推草稿判断。",
              };
            };
            const riskSummary = (workspace, activeReview, activeDiagnosis) => {
              if (workspace.error) {
                return {
                  headline: "任务存在错误",
                  note: truncate(workspace.error, 120),
                };
              }
              if (activeDiagnosis?.reasons?.length) {
                return {
                  headline: `AI 去痕：${aiTraceStateLabel(activeDiagnosis)}`,
                  note: truncate(activeDiagnosis.reasons[0], 120),
                };
              }
              if (reviewAiTraceScore(activeReview) !== null) {
                return {
                  headline: `AI 痕迹 ${reviewAiTraceLabel(activeReview)} / ${reviewHumanizeLabel(activeReview)}`,
                  note: reviewVoiceSummary(activeReview),
                };

              return {
                headline: "暂无明显阻断风险",
                note: "首屏没有识别到错误或高风险提示，继续看版本差异和当前采用版本。",

            };
            const aiTraceStateLabel = (diagnosis) => {
              if (!diagnosis) return "暂无诊断";
              if (diagnosis.state === "completed") return diagnosis.applied ? "已执行并生效" : "已执行";
              if (diagnosis.state === "running") return "执行中";
              if (diagnosis.state === "skipped") return "已跳过";
              if (diagnosis.state === "failed") return "执行失败";
              return diagnosis.triggered ? "已评估" : "未触发";
            };
            const aiTraceStateClass = (diagnosis) => {
              if (!diagnosis) return "pill";
              if (diagnosis.state === "completed") return "pill ok";
              if (diagnosis.state === "failed") return "pill danger";
              if (diagnosis.state === "skipped") return "pill warn";
              if (diagnosis.state === "running") return "pill";
              return diagnosis.triggered ? "pill warn" : "pill";
            };
            const timelineStatusClass = (item) => {
              if (!item) return "pill";
              if (["completed", "selected", "reused"].includes(item.status)) return "pill ok";
              if (["failed", "blocked"].includes(item.status)) return "pill danger";
              if (["manual", "skipped"].includes(item.status)) return "pill warn";
              return "pill";
            };
            const selectionSourceLabel = (selected) => {
              if (!selected) return "默认跟随最新已通过版本";
              if (selected.source === "manual_selected") return "人工改选历史版本";
              if (selected.source === "manual_approved") return "人工确认当前版本";

            const renderAiTraceDiagnosis = (diagnosis) => {

                : '<div class="hint">当前没有额外说明。</div>';
              const targetIds = Array.isArray(diagnosis.rewrite_target_block_ids) && diagnosis.rewrite_target_block_ids.length
                ? diagnosis.rewrite_target_block_ids.join(", ")
                : "无";
              const rewrittenIds = Array.isArray(diagnosis.rewritten_block_ids) && diagnosis.rewritten_block_ids.length
                ? diagnosis.rewritten_block_ids.join(", ")
                : "无";
              return `
                <div class="meta">
                  <div><strong>状态</strong> ${escapeHtml(aiTraceStateLabel(diagnosis))}</div>
                  <div><strong>AI 痕迹 / 触发阈值</strong> ${escapeHtml(diagnosis.ai_trace_score ?? "暂无")} / ${escapeHtml(diagnosis.threshold_score)}</div>
                  <div><strong>改写目标数</strong> ${escapeHtml(diagnosis.rewrite_target_count)}</div>
                  <div><strong>策略风险 / 上限</strong> ${escapeHtml(diagnosis.policy_risk_score ?? "暂无")} / ${escapeHtml(diagnosis.policy_risk_max)}</div>
                  <div><strong>事实风险 / 上限</strong> ${escapeHtml(diagnosis.factual_risk_score ?? "暂无")} / ${escapeHtml(diagnosis.factual_risk_max)}</div>
                  <div><strong>目标段落</strong> ${escapeHtml(targetIds)}</div>
                  <div><strong>实际改写段落</strong> ${escapeHtml(rewrittenIds)}</div>
                  <div><strong>最近事件</strong> ${escapeHtml(diagnosis.last_event_action || "暂无")} · ${escapeHtml(formatDate(diagnosis.last_event_at))}</div>
                </div>
                ${reasons}
              `;
            };
            const renderRelatedArticles = (articles) => {
              if (!Array.isArray(articles) || articles.length === 0) {
                return '<div class="hint">当前任务还没有入选参考文章。</div>';
              }
              return `
                <div class="reference-list">
                  ${articles.map((item) => `
                    <article class="reference-card">
                      <div class="generation-header">
                        <span class="pill">#${escapeHtml(item.rank_no)}</span>
                        <span class="pill">${escapeHtml(item.source_site || "未知站点")}</span>
                        <span class="pill">${escapeHtml(item.fetch_status || "unknown")}</span>
                      </div>
                      <a href="${escapeHtml(item.url)}" target="_blank" rel="noreferrer">${escapeHtml(item.title || item.url)}</a>
                      <div class="meta">
                        <div><strong>查询词</strong> ${escapeHtml(item.query_text || "暂无")}</div>
                        <div><strong>发布时间</strong> ${escapeHtml(formatDate(item.published_at))}</div>
                        <div><strong>相关 / 热度 / 多样性</strong> ${escapeHtml(item.relevance_score ?? "-")} / ${escapeHtml(item.popularity_score ?? "-")} / ${escapeHtml(item.diversity_score ?? "-")}</div>
                        <div><strong>事实密度</strong> ${escapeHtml(item.factual_density_score ?? "-")}</div>
                        <div><strong>摘要</strong> ${escapeHtml(truncate(item.summary || "", 180) || "暂无")}</div>
                      </div>
                    </article>
                  `).join("")}
                </div>
              `;
            };
            const renderTimeline = (items) => {
              if (!Array.isArray(items) || items.length === 0) {
                return '<div class="hint">当前还没有流水线时间线。</div>';
              }
              return `
                <div class="timeline-list">
                  ${items.map((item) => `
                    <article class="timeline-card">
                      <div class="generation-header">
                        <span class="${timelineStatusClass(item)}">${escapeHtml(item.status || "info")}</span>
                        <span class="pill">${escapeHtml(item.stage || "system")}</span>
                        ${item.generation_id ? `<span class="pill">gen ${escapeHtml(item.generation_id.slice(0, 8))}</span>` : ""}
                      </div>
                      <h3>${escapeHtml(item.title || item.action)}</h3>
                      <div class="meta">
                        <div><strong>时间</strong> ${escapeHtml(formatDate(item.created_at))}</div>
                        <div><strong>摘要</strong> ${escapeHtml(item.summary || "暂无")}</div>
                        <div><strong>动作</strong> ${escapeHtml(item.action)}</div>
                      </div>
                      <details>
                        <summary>展开事件详情</summary>
                        <pre>${escapeHtml(JSON.stringify(item.payload || {}, null, 2))}</pre>
                      </details>
                    </article>
                  `).join("")}
                </div>
              `;
            };
            const diffFieldCard = (label, before, after) => `
              <div class="diff-card">
                <strong>${escapeHtml(label)}</strong>
                <div class="meta before"><strong>旧版本</strong><span>${escapeHtml(before || "暂无")}</span></div>
                <div class="meta after" style="margin-top: 8px;"><strong>新版本</strong><span>${escapeHtml(after || "暂无")}</span></div>
              </div>
            `;
            const buildLcsMatrix = (left, right) => {
              const rows = Array.from({ length: left.length + 1 }, () => Array(right.length + 1).fill(0));
              for (let i = left.length - 1; i >= 0; i -= 1) {
                for (let j = right.length - 1; j >= 0; j -= 1) {
                  rows[i][j] = left[i] === right[j] ? rows[i + 1][j + 1] + 1 : Math.max(rows[i + 1][j], rows[i][j + 1]);
                }
              }
              return rows;
            };
            const buildLineDiff = (beforeText, afterText) => {
              const left = String(beforeText || "").split("\n");
              const right = String(afterText || "").split("\n");
              const matrix = buildLcsMatrix(left, right);
              const diff = [];
              let i = 0;
              let j = 0;
              while (i < left.length && j < right.length) {
                if (left[i] === right[j]) {
                  diff.push({ type: "same", text: left[i] });
                  i += 1;
                  j += 1;
                } else if (matrix[i + 1][j] >= matrix[i][j + 1]) {
                  diff.push({ type: "remove", text: left[i] });
                  i += 1;
                } else {
                  diff.push({ type: "add", text: right[j] });
                  j += 1;
                }
              }
              while (i < left.length) {
                diff.push({ type: "remove", text: left[i] });
                i += 1;
              }
              while (j < right.length) {
                diff.push({ type: "add", text: right[j] });
                j += 1;
              }
              return diff;
            };
            const diffSummary = (generations) => {
              if (!Array.isArray(generations) || generations.length < 2) {
                return {
                  headline: "暂无 diff 摘要",
                  note: "至少需要两版 generation，才能直接判断最新改动幅度。",
                };
              }
              const previous = generations[1];
              const latest = generations[0];
              const diffRows = buildLineDiff(previous.markdown_content, latest.markdown_content);
              const addCount = diffRows.filter((item) => item.type === "add").length;
              const removeCount = diffRows.filter((item) => item.type === "remove").length;
              return {
                headline: `v${latest.version_no} 相比 v${previous.version_no}：+${addCount} / -${removeCount}`,
                note: `标题：${latest.title || "暂无"}；上一版标题：${previous.title || "暂无"}`,
              };
            };
            const renderGenerationDiff = (generations) => {
              if (!Array.isArray(generations) || generations.length < 2) {
                return `
                  <div class="detail-card">
                    <h3>版本差异视图</h3>
                    <div class="hint">至少需要两版 generation，才能比较标题、摘要和正文差异。</div>
                  </div>
                `;
              }
              const left = generations[1];
              const right = generations[0];
              const diffRows = buildLineDiff(left.markdown_content, right.markdown_content);
              const addCount = diffRows.filter((item) => item.type === "add").length;
              const removeCount = diffRows.filter((item) => item.type === "remove").length;
              return `
                <div class="detail-card">
                  <h3>版本差异视图</h3>
                  <div class="hint">默认比较最新版本和上一版本。切换版本后，会同步更新标题、摘要和正文的行级差异。</div>
                  <div class="compare-toolbar">
                    <div>
                      <label for="compare-left">旧版本</label>
                      <select id="compare-left">${generations.map((item, index) => `
                        <option value="${escapeHtml(item.generation_id)}" ${index === 1 ? "selected" : ""}>
                          v${escapeHtml(item.version_no)} · ${escapeHtml(item.review?.final_decision || item.status)}
                        </option>
                      `).join("")}</select>
                    </div>
                    <div>
                      <label for="compare-right">新版本</label>
                      <select id="compare-right">${generations.map((item, index) => `
                        <option value="${escapeHtml(item.generation_id)}" ${index === 0 ? "selected" : ""}>
                          v${escapeHtml(item.version_no)} · ${escapeHtml(item.review?.final_decision || item.status)}
                        </option>
                      `).join("")}</select>
                    </div>
                  </div>
                  <div id="diff-view"></div>
                </div>
              `;
            };
            const updateDiffView = (generations) => {
              const diffViewEl = document.getElementById("diff-view");
              const leftSelect = document.getElementById("compare-left");
              const rightSelect = document.getElementById("compare-right");
              if (!diffViewEl || !leftSelect || !rightSelect) {
                return;
              }
              const left = generations.find((item) => item.generation_id === leftSelect.value);
              const right = generations.find((item) => item.generation_id === rightSelect.value);
              if (!left || !right) {
                diffViewEl.innerHTML = '<div class="hint">请选择有效版本。</div>';
                return;
              }
              if (left.generation_id === right.generation_id) {
                diffViewEl.innerHTML = '<div class="hint">请选择两个不同的版本进行比较。</div>';
                return;
              }
              const diffRows = buildLineDiff(left.markdown_content, right.markdown_content);
              const addCount = diffRows.filter((item) => item.type === "add").length;
              const removeCount = diffRows.filter((item) => item.type === "remove").length;
              diffViewEl.innerHTML = `
                <div class="diff-summary">
                  <span class="pill">旧版本 v${escapeHtml(left.version_no)} -> 新版本 v${escapeHtml(right.version_no)}</span>
                  <span class="pill ok">新增行 ${escapeHtml(addCount)}</span>
                  <span class="pill danger">删除行 ${escapeHtml(removeCount)}</span>
                </div>
                <div class="diff-grid">
                  ${diffFieldCard("标题对比", left.title, right.title)}
                  ${diffFieldCard("摘要对比", left.digest, right.digest)}
                </div>
                <pre class="diff-pre">${diffRows.map((item) => `
<span class="diff-line ${escapeHtml(item.type)}">${escapeHtml(item.type === "add" ? "+ " : item.type === "remove" ? "- " : "  ")}${escapeHtml(item.text || "")}</span>`).join("")}
</pre>

            });

            document.getElementById("reject-generation").addEventListener("click", (event) => {
              withButtonBusy(event.currentTarget, "退回中...", async () => {
                const taskId = taskEl.value.trim();
                if (!taskId) throw new Error("请先输入 task_id");
                setStatus("人工驳回重写");
                const result = await request("POST", `/internal/v1/tasks/${taskId}/reject-latest-generation`, buildManualReviewPayload());
                renderOutput(result);
                await refreshRecent();
                await fetchWorkspace(taskId);
              });
            });

            document.getElementById("allow-push").addEventListener("click", (event) => {
              withButtonBusy(event.currentTarget, "放行中...", async () => {
                const taskId = taskEl.value.trim();
                if (!taskId) throw new Error("请先输入 task_id");
                setStatus("允许推稿");
                const result = await request("POST", `/internal/v1/tasks/${taskId}/allow-wechat-draft-push`, buildManualReviewPayload());
                renderOutput(result);
                await refreshRecent();
                await fetchWorkspace(taskId);
              });
            });

            document.getElementById("block-push").addEventListener("click", (event) => {
              withButtonBusy(event.currentTarget, "禁止中...", async () => {
                const taskId = taskEl.value.trim();
                if (!taskId) throw new Error("请先输入 task_id");
                setStatus("禁止推草稿");
                const result = await request("POST", `/internal/v1/tasks/${taskId}/block-wechat-draft-push`, buildManualReviewPayload());
                renderOutput(result);
                await refreshRecent();
                await fetchWorkspace(taskId);
              });
            });

            document.getElementById("push-draft").addEventListener("click", (event) => {
              withButtonBusy(event.currentTarget, "推送中...", async () => {
                const taskId = taskEl.value.trim();
                if (!taskId) throw new Error("请先输入 task_id");
                setStatus("推送草稿中");
                const result = await request("POST", `/internal/v1/tasks/${taskId}/push-wechat-draft`);
                renderOutput(result);
                await refreshRecent();
                await fetchWorkspace(taskId);
              });
            });

            document.getElementById("clear").addEventListener("click", () => {
              setStatus("空闲");
              renderOutput("等待输入...");
              workspaceEl.innerHTML = '<div class="hint">工作台已清空。</div>';
            });

            document.getElementById("refresh-recent").addEventListener("click", (event) => {
              withButtonBusy(event.currentTarget, "刷新中...", async () => {
                setStatus("刷新列表中");
                await refreshRecent();
                setStatus("空闲");
              });
            });

            recentSummaryEl.addEventListener("click", async (event) => {
              const button = event.target.closest("[data-filter-status]");
              if (!button) return;
              const nextStatus = button.getAttribute("data-filter-status") || "";
              recentStatusEl.value = recentStatusEl.value === nextStatus ? "" : nextStatus;
              try {
                setStatus("刷新列表中");
                await refreshRecent();
                setStatus("空闲");
              } catch (error) {
                setStatus("失败");
                renderOutput(error.message || String(error));
              }
            });

            [recentStatusEl, recentSortEl, recentLimitEl, recentActiveEl].forEach((element) => {
              element.addEventListener("change", async () => {
                try {
                  setStatus("刷新列表中");
                  await refreshRecent();
                  setStatus("空闲");
                } catch (error) {
                  setStatus("失败");
                  renderOutput(error.message || String(error));
                }
              });
            });

            recentListEl.addEventListener("click", async (event) => {
              const button = event.target.closest("button[data-action]");
              if (!button) {
                const card = event.target.closest("[data-task-card]");
                if (!card) return;
                const taskId = card.getAttribute("data-task-id");
                try {
                  await loadWorkspaceFromList(taskId);
                  setStatus("空闲");
                } catch (error) {
                  setStatus("失败");
                  renderOutput(error.message || String(error));
                }
                return;
              }
              const taskId = button.getAttribute("data-task-id");
              const action = button.getAttribute("data-action");
              if (!taskId || !action) return;
              setTaskId(taskId);

              withButtonBusy(button, "处理中...", async () => {
                if (action === "workspace") {
                  await loadWorkspaceFromList(taskId);
                  setStatus("空闲");
                  return;
                }
                if (action === "phase3") {
                  setStatus("入队 Phase3");
                  const result = await request("POST", `/internal/v1/tasks/${taskId}/enqueue-phase3`);
                  renderOutput(result);
                  await refreshRecent();
                  await fetchWorkspace(taskId);
                  return;
                }
                if (action === "phase4") {
                  setStatus("执行 Phase4");
                  const result = await request("POST", `/internal/v1/tasks/${taskId}/run-phase4`);
                  renderOutput(result);
                  await refreshRecent();
                  await fetchWorkspace(taskId);
                  return;
                }
                if (action === "approve") {
                  setStatus("人工通过");
                  const result = await request("POST", `/internal/v1/tasks/${taskId}/approve-latest-generation`, buildManualReviewPayload());
                  renderOutput(result);
                  await refreshRecent();
                  await fetchWorkspace(taskId);
                  return;
                }
                if (action === "reject") {
                  setStatus("人工驳回重写");
                  const result = await request("POST", `/internal/v1/tasks/${taskId}/reject-latest-generation`, buildManualReviewPayload());
                  renderOutput(result);
                  await refreshRecent();
                  await fetchWorkspace(taskId);
                  return;
                }
                if (action === "allow-push") {
                  setStatus("允许推稿");
                  const result = await request("POST", `/internal/v1/tasks/${taskId}/allow-wechat-draft-push`, buildManualReviewPayload());
                  renderOutput(result);
                  await refreshRecent();
                  await fetchWorkspace(taskId);
                  return;
                }
                if (action === "block-push") {
                  setStatus("禁止推草稿");
                  const result = await request("POST", `/internal/v1/tasks/${taskId}/block-wechat-draft-push`, buildManualReviewPayload());
                  renderOutput(result);
                  await refreshRecent();
                  await fetchWorkspace(taskId);
                  return;
                }
                if (action === "push") {
                  setStatus("推送草稿中");
                  const result = await request("POST", `/internal/v1/tasks/${taskId}/push-wechat-draft`);
                  renderOutput(result);
                  await refreshRecent();
                  await fetchWorkspace(taskId);
                }
              });
            });

            recentListEl.addEventListener("keydown", async (event) => {
              const card = event.target.closest("[data-task-card]");
              if (!card) return;
              if (event.key !== "Enter" && event.key !== " ") return;
              event.preventDefault();
              const taskId = card.getAttribute("data-task-id");
              try {
                await loadWorkspaceFromList(taskId);
                setStatus("空闲");
              } catch (error) {
                setStatus("失败");
                renderOutput(error.message || String(error));
              }
            });

            workspaceEl.addEventListener("click", async (event) => {
              const button = event.target.closest('button[data-action="select-generation"]');
              if (!button) return;
              const taskId = button.getAttribute("data-task-id") || taskEl.value.trim();
              const generationId = button.getAttribute("data-generation-id");
              if (!taskId || !generationId) return;
              setTaskId(taskId);

              withButtonBusy(button, "采用中...", async () => {
                setStatus("切换当前采用版本");
                const result = await request(
                  "POST",
                  `/internal/v1/tasks/${taskId}/select-generation`,
                  buildManualReviewPayload({ generationId }),
                );
                renderOutput(result);
                await refreshRecent();
                await fetchWorkspace(taskId);
              });
            });

            loadDraft();
            renderOverview([]);
            refreshRecent().catch((error) => {
              renderOverview([]);
              recentListEl.innerHTML = `<div class="hint">${escapeHtml(error.message || "最近任务加载失败，请稍后重试。")}</div>`;
              renderOutput(error.message || String(error));
            });
          </script>
        </body>
        </html>
